<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.7);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      background: #16213e;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box x-score">X<span id="score-x">0</span></div>
    <div class="score-box draw-score">Draws<span id="score-d">0</span></div>
    <div class="score-box o-score">O<span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      document.getElementById('status').textContent = "Player X's turn";
    }

    function checkWinner() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a,b,c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, draw: true };
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = +cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx =>
            document.querySelector(`[data-i="${idx}"]`).classList.add('win')
          );
          document.getElementById('status').textContent = `Player ${result.winner} wins!`;
          scores[result.winner]++;
          document.getElementById(`score-${result.winner.toLowerCase()}`).textContent = scores[result.winner];
        } else {
          document.getElementById('status').textContent = "It's a draw!";
          scores.D++;
          document.getElementById('score-d').textContent = scores.D;
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = `Player ${current}'s turn`;
      }
    });

    document.getElementById('reset').addEventListener('click', init);

    scores = { X: 0, O: 0, D: 0 };
    init();
  </script>
</body>
</html>
