<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Task Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e94560;
      margin-bottom: 0.3rem;
    }

    #date-display {
      color: #a8dadc;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    /* Progress bar */
    #progress-wrap {
      width: 100%;
      max-width: 540px;
      background: #16213e;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #43b369, #a8dadc);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Task list */
    #task-list {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .task-row {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      gap: 0.75rem;
      transition: opacity 0.2s;
    }

    .task-name {
      flex: 1;
      font-size: 1rem;
      transition: color 0.2s, text-decoration 0.2s;
      cursor: text;
    }

    .task-name-input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #a8dadc55;
      border-radius: 6px;
      color: #eee;
      font-size: 1rem;
      padding: 0.2rem 0.5rem;
      outline: none;
    }

    .task-row.done .task-name {
      color: #43b369;
      text-decoration: line-through;
      opacity: 0.7;
    }

    .task-row.missed .task-name {
      color: #e94560;
      opacity: 0.6;
    }

    .btn-green, .btn-red, .btn-delete {
      border: none;
      border-radius: 7px;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }

    .btn-green { background: #43b369; color: #fff; }
    .btn-red   { background: #e94560; color: #fff; }
    .btn-delete { background: #2a2a4a; color: #aaa; font-size: 0.85rem; }

    .btn-green:hover { transform: scale(1.1); }
    .btn-red:hover   { transform: scale(1.1); }
    .btn-delete:hover { color: #e94560; transform: scale(1.1); }

    .btn-green.active { box-shadow: 0 0 10px rgba(67,179,105,0.7); }
    .btn-red.active   { box-shadow: 0 0 10px rgba(233,69,96,0.7); }

    /* Add task row */
    #add-row {
      width: 100%;
      max-width: 540px;
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    #new-task-input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: none;
      background: #16213e;
      color: #eee;
      font-size: 0.95rem;
      outline: none;
    }

    #new-task-input::placeholder { color: #555; }
    #new-task-input:focus { box-shadow: 0 0 0 2px #a8dadc55; }

    #btn-add {
      padding: 0.65rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: #a8dadc;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-add:hover { background: #1a4a80; }

    /* Bottom buttons */
    #bottom-btns {
      display: flex;
      gap: 1rem;
    }

    .action-btn {
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      letter-spacing: 0.5px;
    }

    #btn-summary {
      background: #e94560;
      color: #fff;
    }
    #btn-summary:hover { background: #c73652; transform: scale(1.04); }

    #btn-reset {
      background: #16213e;
      color: #aaa;
    }
    #btn-reset:hover { background: #0f3460; color: #eee; transform: scale(1.04); }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #16213e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    #modal-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    #modal-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 0.4rem; }
    #modal-score { font-size: 1rem; color: #a8dadc; margin-bottom: 0.5rem; }
    #modal-msg   { font-size: 1.1rem; color: #eee; margin-bottom: 1.5rem; }

    #modal-close {
      padding: 0.6rem 2rem;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    #modal-close:hover { background: #c73652; }

    .empty-msg {
      color: #555;
      text-align: center;
      padding: 1.5rem 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <h1>Daily Tasks</h1>
  <div id="date-display"></div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="task-list"></div>

  <div id="add-row">
    <input id="new-task-input" type="text" placeholder="Add a new task..." maxlength="80">
    <button id="btn-add">+ Add</button>
  </div>

  <div id="bottom-btns">
    <button class="action-btn" id="btn-summary">End of Day</button>
    <button class="action-btn" id="btn-reset">Reset Day</button>
  </div>

  <!-- Summary modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-emoji"></div>
      <div id="modal-title"></div>
      <div id="modal-score"></div>
      <div id="modal-msg"></div>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <script>
    const STORAGE_TASKS = 'dtt_tasks';
    const STORAGE_DATE  = 'dtt_date';

    const tiers = [
      { min: 100, emoji: '🌟', title: 'Perfect Day!',         msg: 'You crushed every single task. Incredible!' },
      { min: 80,  emoji: '🎉', title: 'Great Day!',           msg: 'Almost everything done — be proud of that.' },
      { min: 60,  emoji: '👍', title: 'Good Effort!',         msg: 'More than half done. Keep building momentum.' },
      { min: 40,  emoji: '💪', title: 'Room to Improve',      msg: 'Some progress is better than none. Try again tomorrow.' },
      { min: 0,   emoji: '🌅', title: 'Tomorrow Is a New Day', msg: 'Every day is a fresh start. You\'ve got this.' },
    ];

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function load() {
      let tasks = JSON.parse(localStorage.getItem(STORAGE_TASKS) || '[]');
      const saved = localStorage.getItem(STORAGE_DATE);

      // New day — reset state but keep task names
      if (saved !== todayStr()) {
        tasks = tasks.map(t => ({ ...t, state: 'pending' }));
        localStorage.setItem(STORAGE_DATE, todayStr());
        save(tasks);
      }
      return tasks;
    }

    function save(tasks) {
      localStorage.setItem(STORAGE_TASKS, JSON.stringify(tasks));
    }

    let tasks = load();

    function render() {
      save(tasks);
      const list = document.getElementById('task-list');
      list.innerHTML = '';

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty-msg">No tasks yet — add one above!</div>';
      }

      tasks.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'task-row' + (t.state !== 'pending' ? ' ' + t.state : '');

        const name = document.createElement('span');
        name.className = 'task-name';
        name.textContent = t.name;
        name.title = 'Double-click to edit';
        name.ondblclick = () => {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'task-name-input';
          input.value = tasks[i].name;
          input.maxLength = 80;
          row.replaceChild(input, name);
          input.focus();
          input.select();
          const commit = () => {
            const val = input.value.trim();
            if (val) tasks[i].name = val;
            render();
          };
          input.onblur = commit;
          input.onkeydown = e => {
            if (e.key === 'Enter') commit();
            if (e.key === 'Escape') render();
          };
        };

        const btnG = document.createElement('button');
        btnG.className = 'btn-green' + (t.state === 'done' ? ' active' : '');
        btnG.title = 'Done';
        btnG.textContent = '✓';
        btnG.onclick = () => { tasks[i].state = tasks[i].state === 'done' ? 'pending' : 'done'; render(); };

        const btnR = document.createElement('button');
        btnR.className = 'btn-red' + (t.state === 'missed' ? ' active' : '');
        btnR.title = 'Missed';
        btnR.textContent = '✗';
        btnR.onclick = () => { tasks[i].state = tasks[i].state === 'missed' ? 'pending' : 'missed'; render(); };

        const btnDel = document.createElement('button');
        btnDel.className = 'btn-delete';
        btnDel.title = 'Remove task';
        btnDel.textContent = '🗑';
        btnDel.onclick = () => { tasks.splice(i, 1); render(); };

        row.appendChild(name);
        row.appendChild(btnG);
        row.appendChild(btnR);
        row.appendChild(btnDel);
        list.appendChild(row);
      });

      updateProgress();
    }

    function updateProgress() {
      const done = tasks.filter(t => t.state === 'done').length;
      const pct = tasks.length ? (done / tasks.length) * 100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function showSummary() {
      if (tasks.length === 0) {
        alert('Add some tasks first!');
        return;
      }
      const done   = tasks.filter(t => t.state === 'done').length;
      const pct    = Math.round((done / tasks.length) * 100);
      const tier   = tiers.find(t => pct >= t.min);

      document.getElementById('modal-emoji').textContent = tier.emoji;
      document.getElementById('modal-title').textContent = tier.title;
      document.getElementById('modal-score').textContent = `${done} / ${tasks.length} tasks completed (${pct}%)`;
      document.getElementById('modal-msg').textContent   = tier.msg;
      document.getElementById('modal-overlay').classList.add('open');
    }

    function resetDay() {
      if (confirm('Reset all task states for today?')) {
        tasks = tasks.map(t => ({ ...t, state: 'pending' }));
        render();
      }
    }

    // Date display
    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // Add task
    document.getElementById('btn-add').onclick = addTask;
    document.getElementById('new-task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const input = document.getElementById('new-task-input');
      const name = input.value.trim();
      if (!name) return;
      tasks.push({ name, state: 'pending' });
      input.value = '';
      render();
    }

    document.getElementById('btn-summary').onclick = showSummary;
    document.getElementById('btn-reset').onclick   = resetDay;
    document.getElementById('modal-close').onclick = () =>
      document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-overlay').onclick = e => {
      if (e.target === document.getElementById('modal-overlay'))
        document.getElementById('modal-overlay').classList.remove('open');
    };

    // Default tasks for first-time users
    if (tasks.length === 0) {
      tasks = [
        { name: 'Morning exercise', state: 'pending' },
        { name: 'Read for 20 minutes', state: 'pending' },
        { name: 'Drink 8 glasses of water', state: 'pending' },
      ];
      localStorage.setItem(STORAGE_DATE, todayStr());
    }

    render();
  </script>
</body>
</html>
